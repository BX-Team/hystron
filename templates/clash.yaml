allow-lan: true
mode: rule
log-level: info

dns:
  enable: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - '*.lan'
    - stun.*.*.*
    - stun.*.*
    - time.windows.com
    - time.nist.gov
    - pool.ntp.org
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'

proxies:
{proxies}

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - {}

rules:
  - MATCH,PROXY
